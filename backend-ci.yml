name: Backend CI

on:
  pull_request:
    paths: ['backend/**']
  push:
    branches: [main, develop]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret

      - name: Build Docker image (sanity check)
        run: docker build -t gourmetcanvas-elite-backend:ci .
